<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>🎺 100週連続LT登壇 達成記念AR | Cor.Inc</title>

  <!-- OGP -->
  <meta property="og:title" content="100週連続LT登壇 達成記念AR">
  <meta property="og:description" content="寺田康佑(Cor.Inc CEO)の100週連続LT登壇を、ARで体験する記念ページ">
  <meta property="og:type" content="website">

  <!-- A-Frame 1.7.0 -->
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>

  <!-- MindAR (画像トラッキング) -->
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <!-- セレブレーション演出スクリプト(Viteビルドで処理される) -->
  <script type="module" src="../src/celebration.ts"></script>

  <!-- スタイル -->
  <link rel="stylesheet" href="../src/styles/celebration.css">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000;
      overscroll-behavior: none;
      touch-action: manipulation;
      font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Helvetica Neue', sans-serif;
    }

    /* MindARカメラ映像とWebGL canvasのレイヤー制御 */
    a-scene {
      position: fixed !important;
      top: 0;
      left: 0;
      width: 100vw !important;
      height: 100vh !important;
    }

    .a-canvas {
      background: transparent !important;
      z-index: 1 !important;
    }

    /* 初期インストラクション */
    #info {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(0, 0, 0, 0.75);
      padding: 12px 20px;
      z-index: 1000;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      transition: opacity 0.4s ease;
      max-width: calc(100% - 40px);
      box-sizing: border-box;
    }

    #info.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #info h3 {
      margin: 0 0 4px 0;
      font-size: 16px;
    }

    #info p {
      margin: 4px 0;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <!-- インストラクション -->
  <div id="info">
    <h3>🎺 100週連続LT登壇 達成記念AR</h3>
    <p>📸 ステッカーにカメラを向けてください</p>
    <p id="status">⏳ 初期化中...</p>
  </div>

  <!-- 祝福メッセージオーバーレイ -->
  <div id="celebration-message">
    <h1>🎉 100週連続LT登壇<br>達成! 🎉</h1>
    <p>みなさん、いつもありがとう!</p>
    <p class="signature">寺田康佑 / Cor.Inc</p>
  </div>

  <!-- SNS共有ボタン -->
  <button id="share-button" type="button">
    𝕏 でお祝いを共有する
  </button>

  <!-- AR Scene -->
  <a-scene
    mindar-image="imageTargetSrc: /assets/markers/profile-sticker.mind; uiScanning: yes; uiLoading: no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 5; missTolerance: 5"
    color-space="sRGB"
    embedded
    renderer="alpha: true; colorManagement: true; physicallyCorrectLights: true"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    id="ar-scene"
  >
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- マーカー -->
    <a-entity mindar-image-target="targetIndex: 0" id="marker">
      <!-- ステッカー上空に「100週」SVGを配置(初期非表示) -->
      <a-image
        id="celebration-image"
        src="/assets/images/lt100-celebration.svg"
        position="0 0.5 0"
        width="1.2"
        height="1.2"
        visible="false"
        opacity="0"
      ></a-image>
    </a-entity>
  </a-scene>
</body>
</html>
