<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>MindAR Debug - Camera Only</title>
  <script src="https://aframe.io/releases/1.7.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <style>
    body { margin: 0; }
    .example-container {
      overflow: hidden;
      position: absolute;
      width: 100%;
      height: 100%;
    }
    #debug-info {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,255,0,0.8);
      color: black;
      padding: 8px 12px;
      z-index: 1000;
      font-family: monospace;
      font-size: 14px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="debug-info">DEBUG: 公式パターン最小例。カメラ映像が見えればMindARはOK</div>
  <div class="example-container">
    <a-scene
      mindar-image="imageTargetSrc: /assets/markers/profile-sticker.mind; uiScanning: yes; uiLoading: no"
      embedded
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <a-box position="0 0 0.1" scale="0.5 0.5 0.5" color="red"></a-box>
      </a-entity>
    </a-scene>
  </div>
</body>
</html>
